services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: tutorial-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    restart: unless-stopped

  tutorial-api:
    build:
      context: ..
      dockerfile: tutorial-api/Dockerfile
    image: ai-agents-basic/tutorial-api:latest
    depends_on:
      - chromadb
    ports:
      - "5050:5050"
    volumes:
      - ../techcorp-docs:/app/techcorp-docs:ro
    environment:
      FLASK_RUN_PORT: "5050"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-nano}
      CHROMA_HOST: ${CHROMA_HOST:-chromadb}
      CHROMA_PORT: ${CHROMA_PORT:-8000}
      TECHCORP_DOCS_DIR: ${TECHCORP_DOCS_DIR:-/app/techcorp-docs}
    restart: unless-stopped

volumes:
  chromadb_data:
